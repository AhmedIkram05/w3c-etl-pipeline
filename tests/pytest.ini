[pytest]
markers =
    integration: marks tests that need Docker stack running
    dag_integrity: marks tests that need Airflow environment
    terraform: marks tests that need terraform binary on PATH
filterwarnings =
    # ── Project-internal DeprecationWarnings (allow) ──
    ignore::DeprecationWarning:airflow.*
    ignore::DeprecationWarning:pyspark.*
    ignore:.*google\._upb\._message.*:DeprecationWarning
    # ── Upstream Airflow-dependency warnings (3rd-party, fixed by Airflow 3) ──
    ignore::DeprecationWarning:flask_sqlalchemy.*
    ignore::DeprecationWarning:flask_appbuilder.*
    ignore::DeprecationWarning:marshmallow_sqlalchemy.*
    ignore:.*SQLAlchemy 2\.0.*
    ignore:.*__version__.*
cache_dir = /tmp/.pytest_cache
