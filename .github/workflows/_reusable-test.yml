name: Reusable Test

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Create Airflow directory structure
        run: |
          sudo mkdir -p /opt/airflow/dags
          sudo ln -sf $PWD/airflow/dags/w3c /opt/airflow/dags/w3c
          # spark/jobs needed by spark_ingestion.py at module load time
          sudo mkdir -p /opt/airflow/spark/jobs
          sudo ln -sf $PWD/airflow/spark/jobs/utils /opt/airflow/spark/jobs/utils
          sudo mkdir -p /opt/airflow/plugins
          sudo ln -sf $PWD/airflow/plugins/operators /opt/airflow/plugins/operators
      - name: Install dependencies
        run: |
          pip install -r tests/requirements-test.txt
          pip install pytest apache-airflow-providers-databricks
      - name: Run tests with coverage
        # Run everything except integration tests (need Azure creds)
        # and dbt_compile tests (need dbt compile to have run first).
        run: pytest tests/ -v --tb=short -m "not integration and not dbt_compile" --cov=airflow --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: pytest
          fail_ci_if_error: false
