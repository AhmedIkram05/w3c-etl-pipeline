name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Convert image name to lowercase
        run: |
          echo "IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Airflow image
        uses: docker/build-push-action@v6
        with:
          context: airflow
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/airflow:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/airflow:${{ github.sha }}
      
      - name: Build and push Spark image
        uses: docker/build-push-action@v6
        with:
          context: airflow/spark
          file: airflow/spark/docker/Dockerfile.spark
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/spark:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/spark:${{ github.sha }}
            
      - name: Build and push Alertmanager image
        uses: docker/build-push-action@v6
        with:
          context: airflow/docker/alertmanager
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/alertmanager:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/alertmanager:${{ github.sha }}

  # Note: You may need to uncomment and configure this to actually deploy your Databricks scripts
  deploy-databricks:
    runs-on: ubuntu-latest
    needs: build
    steps:
