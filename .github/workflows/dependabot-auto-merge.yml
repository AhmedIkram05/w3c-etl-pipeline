# ---------------------------------------------------------------------------
# Dependabot Auto-Merge
# ---------------------------------------------------------------------------
# Auto-merges Dependabot PRs that match the allowed update types defined in
# .github/dependabot.yml (patch-only for pip, minor/patch for others).
#
# Triggered by Dependabot's automatic PR creation. Owner is checked to ensure
# only Dependabot PRs are processed.
# ---------------------------------------------------------------------------

name: Dependabot Auto-Merge

on: pull_request

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-merge:
    name: Auto-Merge Dependabot Patches
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-merge patch updates
        if: ${{ steps.metadata.outputs.update-type == 'version-update:semver-patch' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
