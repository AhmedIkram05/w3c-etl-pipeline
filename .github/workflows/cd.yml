# ---------------------------------------------------------------------------
# CD - Deploy to Azure
# ---------------------------------------------------------------------------
# Runs on merge to main. Deploys Terraform infra, dbt models, Airflow DAGs,
# then runs a post-deploy smoke test.
#
# Single environment: azure-dev (auto-approve on merge to main).
# Rollback available via workflow_dispatch.
#
# Pull requests run terraform-plan only (read-only). Apply and all downstream
# jobs are skipped — fast feedback without risking the environment.
# ---------------------------------------------------------------------------
name: CD - Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-terraform  # Single slot — cancel stale runs to avoid state lock collisions
  cancel-in-progress: true

env:
  TF_VERSION: "1.10.5"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -----------------------------------------------------------------------
  # Terraform Plan (read-only, always runs)
  # -----------------------------------------------------------------------
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: azure-dev
    permissions:
      id-token: write
      contents: read
    outputs:
      plan_a_exitcode: ${{ steps.plan_a.outputs.exitcode }}
      plan_b_exitcode: ${{ steps.plan_b.outputs.exitcode }}
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "${{ env.TF_VERSION }}"

      - name: Terraform Plan (Part A)
        id: plan_a
        run: |
          cd terraform/part_a
          terraform init -input=false
          set -o pipefail
          # -lock=false: safe for read-only plans, avoids state lock contention
          # when a concurrent apply holds the lock.
          terraform plan -no-color -lock=false -input=false -var-file=environments/dev/terraform.tfvars 2>&1 | tee tfplan_a.log || exitcode=$?
          echo "exitcode=${exitcode:-0}" >> "$GITHUB_OUTPUT"

      - name: Upload Part A Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-part-a
          path: terraform/part_a/tfplan_a.log

      - name: Terraform Plan (Part B)
        id: plan_b
        if: github.actor != 'dependabot[bot]'
        env:
          DATABRICKS_AUTH_TYPE: pat
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          TF_VAR_azure_sql_password: ${{ secrets.AZURE_SQL_PASSWORD }}
          TF_VAR_storage_access_key: ${{ secrets.STORAGE_ACCESS_KEY }}
        run: |
          cd terraform/part_b
          terraform init -input=false
          set -o pipefail
          terraform plan -no-color -input=false -var-file=environments/dev/terraform.tfvars 2>&1 | tee tfplan_b.log || exitcode=$?
          echo "exitcode=${exitcode:-0}" >> "$GITHUB_OUTPUT"

      - name: Upload Part B Plan
        if: steps.plan_b.conclusion == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-part-b
          path: terraform/part_b/tfplan_b.log

  # -----------------------------------------------------------------------
  # Terraform Apply (per environment, gated by GitHub Environments)
  # -----------------------------------------------------------------------
  terraform-apply:
    name: Terraform Apply
    if: github.event_name != 'pull_request'
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment: azure-dev
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 30
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "${{ env.TF_VERSION }}"

      - name: Terraform Apply (Part A)
        run: |
          cd terraform/part_a
          terraform init -input=false -migrate-state
          terraform apply -auto-approve -input=false -var-file=environments/dev/terraform.tfvars

      - name: Terraform Apply (Part B)
        env:
          DATABRICKS_AUTH_TYPE: pat
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          TF_VAR_azure_sql_password: ${{ secrets.AZURE_SQL_PASSWORD }}
          TF_VAR_storage_access_key: ${{ secrets.STORAGE_ACCESS_KEY }}
        run: |
          cd terraform/part_b
          terraform init -input=false
          terraform apply -auto-approve -input=false -var-file=environments/dev/terraform.tfvars

  # -----------------------------------------------------------------------
  # Deploy dbt Models
  # -----------------------------------------------------------------------
  deploy-dbt:
    name: Deploy dbt Models
    needs: terraform-apply
    runs-on: ubuntu-latest
    environment: azure-dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dbt
        run: pip install "dbt-sqlserver==1.8.7" "dbt-core==1.8.9" "dbt-common==1.27.1" "protobuf>=5.27,<6"

      - name: Install ODBC Driver 18 for SQL Server
        run: |
          sudo apt-get update && sudo apt-get install -y curl gnupg2
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/ubuntu/24.04/prod noble main" | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 mssql-tools18

      - name: dbt deps
        run: dbt deps --project-dir airflow/dbt/w3c

      - name: dbt run (--defer --state, with first-deploy fallback)
        env:
          AZURE_SQL_SERVER: ${{ vars.AZURE_SQL_SERVER }}
          AZURE_SQL_DB: ${{ vars.AZURE_SQL_DATABASE }}
          AZURE_SQL_USER: ${{ vars.AZURE_SQL_USER }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
        run: |
          cd airflow/dbt/w3c
          if [ -f "./target-prod/manifest.json" ]; then
            echo "Found production state — running with --defer"
            dbt run --profile w3c_azure --profiles-dir ../ --defer --state ./target-prod
          else
            echo "No production state found — running without --defer (first deploy)"
            dbt run --profile w3c_azure --profiles-dir ../
          fi

      - name: dbt test
        env:
          AZURE_SQL_SERVER: ${{ vars.AZURE_SQL_SERVER }}
          AZURE_SQL_DB: ${{ vars.AZURE_SQL_DATABASE }}
          AZURE_SQL_USER: ${{ vars.AZURE_SQL_USER }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
        run: |
          cd airflow/dbt/w3c
          dbt test --profile w3c_azure --profiles-dir ../

  # -----------------------------------------------------------------------
  # Sync Airflow DAGs to ADLS
  # -----------------------------------------------------------------------
  sync-airflow:
    name: Sync Airflow DAGs
    needs: terraform-apply
    runs-on: ubuntu-latest
    environment: azure-dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install ADLS extension
        run: az extension add --name storage-preview -y

      - name: Sync DAGs to ADLS Gen2
        run: |
          az storage fs directory upload \
            -f airflow-dags \
            -s airflow/dags/ \
            --account-name ${{ vars.STORAGE_ACCOUNT_NAME }} \
            --auth-mode login \
            --recursive

      - name: DAG file sync complete — smoke test will trigger ingestion
        run: echo "DAGs synced to ADLS; smoke test will trigger the ingestion DAG"

  # -----------------------------------------------------------------------
  # Post-Deploy Smoke Test
  # -----------------------------------------------------------------------
  smoke-test:
    name: Post-Deploy Smoke Test
    needs: [deploy-dbt, sync-airflow]
    runs-on: ubuntu-latest
    environment: azure-dev
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Airflow DAG via REST API
        run: |
          DAG_RUN_ID=$(curl -s -X POST "${{ vars.AIRFLOW_URL }}/api/v1/dags/w3c_spark_ingestion_azure/dagRuns" \
            -u "${{ vars.AIRFLOW_USERNAME }}:${{ secrets.AIRFLOW_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d '{"conf": {"trigger_source": "cd_smoke_test"}}' | jq -r '.dag_run_id // empty')
          echo "DAG_RUN_ID=$DAG_RUN_ID" >> "$GITHUB_ENV"
          echo "Triggered DAG run: $DAG_RUN_ID"

      - name: Poll DAG Until Complete
        run: |
          for i in $(seq 1 60); do
            STATE=$(curl -s "${{ vars.AIRFLOW_URL }}/api/v1/dags/w3c_spark_ingestion_azure/dagRuns/${{ env.DAG_RUN_ID }}" \
              -u "${{ vars.AIRFLOW_USERNAME }}:${{ secrets.AIRFLOW_PASSWORD }}" | jq -r '.state // "unknown"')
            echo "Attempt $i: DAG state = $STATE"
            if [ "$STATE" = "success" ]; then
              echo "DAG completed successfully"
              exit 0
            fi
            if [ "$STATE" = "failed" ] || [ "$STATE" = "upstream_failed" ]; then
              echo "DAG failed"
              exit 1
            fi
            sleep 15
          done
          echo "Timeout waiting for DAG to complete"
          exit 1

      - name: Assert Azure SQL Row Count
        run: |
          ROWS=$(sqlcmd -S "${{ vars.AZURE_SQL_SERVER }}" \
            -d "${{ vars.AZURE_SQL_DATABASE }}" \
            -U "${{ vars.AZURE_SQL_USER }}" \
            -P "${{ secrets.AZURE_SQL_PASSWORD }}" \
            -Q "SET NOCOUNT ON; SELECT COUNT(*) FROM dbo.raw_enriched" -h -1 | tr -d ' ')
          echo "Azure SQL dbo.raw_enriched row count: $ROWS"
          if [ "$ROWS" -gt 0 ]; then
            echo "Smoke test PASSED — $ROWS rows found"
            exit 0
          else
            echo "Smoke test FAILED — no rows in dbo.raw_enriched"
            exit 1
          fi

  # -----------------------------------------------------------------------
  # Deploy dbt Docs to GitHub Pages
  # -----------------------------------------------------------------------
  deploy-dbt-docs:
    name: Deploy dbt Docs
    if: github.event_name != 'pull_request'
    needs: deploy-dbt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: airflow
          POSTGRES_PASSWORD: airflow
          POSTGRES_DB: w3c_warehouse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U airflow -d w3c_warehouse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      W3C_DB_HOST: localhost
      W3C_DB_PORT: "5432"
      W3C_DB_NAME: w3c_warehouse
      W3C_DB_USER: airflow
      W3C_DB_PASS: airflow

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dbt
        run: pip install "dbt-postgres==1.8.2" "dbt-core==1.8.9"

      - name: Install dbt packages
        run: dbt deps --project-dir airflow/dbt/w3c

      - name: Generate dbt docs
        run: >-
          dbt docs generate
          --project-dir airflow/dbt/w3c
          --profiles-dir airflow/dbt

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: airflow/dbt/w3c/target

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # -----------------------------------------------------------------------
  # Rollback (manual workflow_dispatch only)
  # -----------------------------------------------------------------------
  rollback:
    name: Rollback
    if: github.event_name == 'workflow_dispatch'
    needs: [terraform-plan]
    runs-on: ubuntu-latest
    environment: azure-dev
    permissions:
      id-token: write
      contents: read
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed to resolve HEAD~1

      - name: Checkout previous commit (rollback)
        run: git checkout HEAD~1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "${{ env.TF_VERSION }}"

      - name: Terraform Rollback — Part A (plan)
        run: |
          cd terraform/part_a
          terraform init -input=false -migrate-state
          terraform plan -no-color -input=false -var-file=environments/dev/terraform.tfvars -out=tfplan_rollback

      - name: Terraform Rollback — Part A (apply)
        run: |
          cd terraform/part_a
          terraform apply -auto-approve -input=false tfplan_rollback

      - name: Terraform Rollback — Part B (plan)
        env:
          DATABRICKS_AUTH_TYPE: pat
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          TF_VAR_azure_sql_password: ${{ secrets.AZURE_SQL_PASSWORD }}
          TF_VAR_storage_access_key: ${{ secrets.STORAGE_ACCESS_KEY }}
        run: |
          cd terraform/part_b
          terraform init -input=false -migrate-state
          terraform plan -no-color -input=false -var-file=environments/dev/terraform.tfvars -out=tfplan_rollback

      - name: Terraform Rollback — Part B (apply)
        env:
          DATABRICKS_AUTH_TYPE: pat
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          TF_VAR_azure_sql_password: ${{ secrets.AZURE_SQL_PASSWORD }}
          TF_VAR_storage_access_key: ${{ secrets.STORAGE_ACCESS_KEY }}
        run: |
          cd terraform/part_b
          terraform init -input=false
          terraform apply -auto-approve -input=false tfplan_rollback


