name: 'w3c'
version: '1.0.0'
config-version: 2

profile: "{{ env_var('DBT_PROFILE', 'w3c') }}"

model-paths: ["models"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

packages-install-path: "dbt_packages"

clean-targets:
  - "target"
  - "dbt_packages"

models:
  w3c:
    staging:
      +materialized: table
      +schema: staging
    marts:
      +materialized: table
      +schema: marts

vars:
  uk_holidays:
    # 2009
    - '2009-01-01'
    - '2009-04-13'
    - '2009-05-04'
