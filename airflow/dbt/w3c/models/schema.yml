version: 2

models:
  - name: dim_date
    description: "Calendar date dimension enriched with UK holidays, weekday/weekend, quarter, and week-of-year attributes"
    columns:
      - name: date_sk
        description: "Foreign key to dim_date"
        tests:
          - unique
          - not_null
      - name: date
        description: "Calendar date"
      - name: year
        description: "Year"
        tests:
          - not_null
      - name: month
        description: "Month number (1-12)"
        tests:
          - not_null
      - name: month_name
        description: "Month name"
      - name: day_number
        description: "Day of month (1-31)"
      - name: day_name
        description: "Day of week name"
      - name: day_of_week
        description: "Day of week (0=Sunday, 6=Saturday)"
      - name: quarter
        description: "Quarter (1-4)"
        tests:
          - not_null
      - name: week_of_year
        description: "ISO week number"
      - name: is_weekend
        description: "'Yes' if Saturday or Sunday"
      - name: holiday_flag
        description: "'Yes' if a UK bank holiday"

  - name: dim_time
    description: "Time-of-day dimension with 1440 minute-level rows and shift/band grouping"
    columns:
      - name: time_sk
        description: "Surrogate key (HHMM format)"
        tests:
          - unique
          - not_null
      - name: hour
        description: "Hour (0-23)"
        tests:
          - not_null
      - name: minute
        description: "Minute (0-59)"
        tests:
          - not_null
      - name: am_pm
        description: "AM or PM"
      - name: time_band
        description: "Time band (Early Morning, Morning, Afternoon, Evening)"
      - name: shift_id
        description: "Shift identifier (1-4)"

  - name: dim_page
    description: "Page dimension with URI stem, query string, extracted directory, file name, extension, and category"
    columns:
      - name: page_sk
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: page_path
        description: "URI stem (path)"
        tests:
          - not_null
      - name: query_string
        description: "Query string ('-' if none)"
      - name: directory
        description: "Parent directory extracted from path"
      - name: file_name
        description: "File name extracted from path"
      - name: file_extension
        description: "File extension (css, js, image, html, etc.)"
      - name: page_category
        description: "Content type classification (Static Page, Image, Script, etc.)"

  - name: dim_status
    description: "HTTP status code dimension with category, severity, and description"
    columns:
      - name: status_sk
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: status_code
        description: "HTTP status code"
        tests:
          - not_null
      - name: sub_status
        description: "IIS sub-status code"
      - name: win32_status
        description: "Win32 status code"
      - name: status_category
        description: "Category (Success, Client Error, Server Error, etc.)"
      - name: status_label
        description: "Human-readable status description"
      - name: description
        description: "Detailed human-readable description of the HTTP status code"
      - name: severity
        description: "Severity level (Info, Warning, Error, Critical)"

  - name: dim_method
    description: "HTTP method dimension aligned with Power BI semantic model"
    columns:
      - name: method_sk
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: http_method
        description: "HTTP method (GET, POST, etc.)"
        tests:
          - not_null
      - name: description
        description: "Human-readable method description"
      - name: is_safe
        description: "Safe/Unsafe classification"

  - name: dim_referrer
    description: "Referrer dimension with domain extraction and traffic source classification"
    columns:
      - name: referrer_sk
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: referrer_url
        description: "Full referrer URL ('Direct' for direct traffic)"
        tests:
          - not_null
      - name: referrer_domain
        description: "Extracted domain from referrer URL"
      - name: traffic_source
        description: "Traffic source (Direct, Search Engine, Social Media, Referral, etc.)"

  - name: dim_visit_buckets
    description: "Visit bucket dimension grouping IPs by visit frequency"
    columns:
      - name: visit_bucket_sk
        description: "Surrogate key (same as visit_bucket_order, 1-6)"
        tests:
          - unique
          - not_null
      - name: visit_bucket
        description: "Bucket label (e.g. '1 Visit', '2-5 Visits')"
        tests:
          - unique
          - not_null
      - name: visit_bucket_order
        description: "Sort order for buckets"
        tests:
          - unique
          - not_null
      - name: user_count
        description: "Number of unique users (IPs) in this bucket"
        tests:
          - not_null

  - name: fact_webrequest
    description: "Fact table linking all dimensions to individual HTTP request metrics with pre-computed analytic columns"
    tests:
      - dbt_utils.expression_is_true:
          expression: "raw_log_id IS NOT NULL"
    columns:
      - name: raw_log_id
        description: "Natural key (MD5 hash of source_file + log_time + client_ip + user_agent + referrer + uri_stem + uri_query + method + status + sub_status + win32_status + time_taken). See tests/singular/fact_webrequest_dedup_safety.sql for the regression test guarding this contract."
        tests:
          - unique
          - not_null
      - name: source_file
        description: "Source IIS log file name"
      - name: date_sk
        description: "Foreign key to dim_date"
        tests:
          - relationships:
              to: ref('dim_date')
              field: date_sk
      - name: time_sk
        description: "Foreign key to dim_time"
        tests:
          - relationships:
              to: ref('dim_time')
              field: time_sk
      - name: page_sk
        description: "Foreign key to dim_page"
        tests:
          - relationships:
              to: ref('dim_page')
              field: page_sk
      - name: method_sk
        description: "Foreign key to dim_method"
        tests:
          - relationships:
              to: ref('dim_method')
              field: method_sk
      - name: status_sk
        description: "Foreign key to dim_status"
        tests:
          - relationships:
              to: ref('dim_status')
              field: status_sk
      - name: referrer_sk
        description: "Foreign key to dim_referrer"
        tests:
          - relationships:
              to: ref('dim_referrer')
              field: referrer_sk
      - name: geolocation_sk
        description: "Foreign key to dim_geolocation"
      - name: user_agent_sk
        description: "Foreign key to dim_useragent"
      - name: visitor_sk
        description: "Foreign key to dim_visitortype"
      - name: visit_bucket_sk
        description: "Foreign key to dim_visit_buckets"
        tests:
          - relationships:
              to: ref('dim_visit_buckets')
              field: visit_bucket_sk
      - name: bytes_sent
        description: "Bytes sent in response"
      - name: bytes_received
        description: "Bytes received in request"
      - name: response_time_ms
        description: "Request duration in milliseconds"
      - name: request_count
        description: "Row count per fact record (always 1)"
      - name: is_404
        description: "Flag indicating a 404 Not Found response"
      - name: is_crawler
        description: "Flag indicating the request came from a known crawler IP"
      - name: is_direct_traffic
        description: "Flag indicating direct traffic (no referrer)"
      - name: size_band
        description: "Size category (Zero, Tiny, Small, Medium, Large, Huge) based on total bytes"

      - name: page_category
        description: "Page category computed from URI stem"
      - name: referrer_domain
        description: "Domain extracted from referrer URL"
      - name: traffic_type
        description: "Traffic type classified from referrer (e.g. Direct, Search, Social)"
      - name: time_band
        description: "Time band denormalized from dim_time for convenience (Early Morning, Morning, Afternoon, Evening)"

  - name: crawler_ips
    description: "Known crawler IPs detected from robots.txt requests, managed by dbt"
    columns:
      - name: ip
        description: "Crawler IP address"
        tests:
          - unique
          - not_null

  - name: dim_visitortype
    description: "Visitor type dimension (Crawler=1, Human=2, Unknown=-1)"
    columns:
      - name: visitor_sk
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: crawler_flag
        description: "'Yes' for crawler, 'No' for human, 'Ukn' for unknown"
      - name: visitor_type
        description: "Visitor type label"

  - name: mart_page_performance
    description: "Page-level performance aggregation with error rates, response time metrics, and slow request analysis"
    tests:
      - dbt_utils.expression_is_true:
          expression: "total_requests >= 0"
    columns:
      - name: page_sk
        description: "Foreign key to dim_page"
        tests:
          - not_null
      - name: page_path
        description: "URI stem (path)"
      - name: page_category
        description: "Content type classification"
      - name: total_requests
        description: "Total request count for this page"
        tests:
          - not_null
      - name: unique_hosts
        description: "Number of unique hosts (IPs) accessing this page"
      - name: total_404
        description: "Count of 404 responses"
      - name: pct_404
        description: "Percentage of requests resulting in 404"
      - name: total_bytes_sent
        description: "Total bytes transferred"
      - name: avg_response_time_ms
        description: "Average response time in milliseconds"
      - name: p95_response_time_ms
        description: "95th percentile response time in milliseconds"
      - name: max_response_time_ms
        description: "Maximum response time in milliseconds"
      - name: slow_requests
        description: "Count of requests with response time exceeding 5000ms"
      - name: pct_slow_requests
        description: "Percentage of requests with response time exceeding 5000ms"
      - name: active_days
        description: "Number of distinct days with activity"

  - name: mart_daily_aggregates
    description: "Daily traffic and performance summary with crawler, direct traffic breakdowns, and latency analysis"
    tests:
      - dbt_utils.expression_is_true:
          expression: "total_requests >= 0"
    columns:
      - name: date_sk
        description: "Foreign key to dim_date"
        tests:
          - unique
          - not_null
      - name: date
        description: "Calendar date"
      - name: year
        description: "Year extracted from date"
      - name: month
        description: "Month number (1-12)"
      - name: day_name
        description: "Day of week name"
      - name: is_weekend
        description: "'Yes' if weekend"
      - name: holiday_flag
        description: "'Yes' if UK bank holiday"
      - name: total_requests
        description: "Total requests for the day"
      - name: unique_hosts
        description: "Number of unique hosts (IPs) visiting the site"
      - name: unique_human_hosts
        description: "Number of unique human (non-crawler) hosts"
      - name: unique_pages
        description: "Number of unique pages requested"
      - name: active_countries
        description: "Number of distinct countries with traffic"
      - name: total_404
        description: "Count of 404 responses"
      - name: pct_404
        description: "Percentage of 404 responses"
      - name: avg_response_time_ms
        description: "Average response time in milliseconds"
      - name: p95_response_time_ms
        description: "95th percentile response time in milliseconds"
      - name: total_bytes_sent
        description: "Total bytes transferred"
      - name: crawler_requests
        description: "Requests from known crawler IPs"
      - name: pct_crawler
        description: "Percentage of requests from crawlers"
      - name: direct_traffic_requests
        description: "Direct traffic requests"
      - name: slow_requests
        description: "Count of requests with response time exceeding 5000ms"
      - name: pct_slow_requests
        description: "Percentage of requests with response time exceeding 5000ms"

  - name: mart_crawler_analysis
    description: "Crawler behavior analysis with error rates, resource usage, and host-level metrics"
    tests:
      - dbt_utils.expression_is_true:
          expression: "total_crawler_requests >= 0"
    columns:
      - name: date_sk
        description: "Foreign key to dim_date"
        tests:
          - unique
          - not_null
      - name: date
        description: "Calendar date"
      - name: total_crawler_requests
        description: "Total requests from crawlers"
      - name: distinct_pages_hit
        description: "Number of distinct pages crawled"
      - name: distinct_hosts_hit
        description: "Number of distinct crawler hosts (IPs)"
      - name: total_bytes_transferred
        description: "Total bytes transferred by crawlers"
      - name: avg_bytes_per_request
        description: "Average bytes per crawler request"
      - name: avg_response_time_ms
        description: "Average response time for crawler requests"
      - name: max_response_time_ms
        description: "Maximum response time for crawler requests"
      - name: pages_with_errors
        description: "Distinct pages returning client errors"
      - name: pct_error_responses
        description: "Percentage of crawler requests resulting in errors"

  - name: mart_timeofday_analysis
    description: "Hourly traffic and performance breakdown showing time-of-day traffic and latency patterns"
    tests:
      - dbt_utils.expression_is_true:
          expression: "total_requests >= 0"
    columns:
      - name: date_sk
        description: "Foreign key to dim_date"
        tests:
          - not_null
      - name: date
        description: "Calendar date"
      - name: day_name
        description: "Day of week name"
      - name: hour
        description: "Hour of day (0-23)"
        tests:
          - not_null
      - name: time_band
        description: "Time band (Early Morning, Morning, Afternoon, Evening)"
      - name: total_requests
        description: "Total requests for this hour"
      - name: unique_pages
        description: "Number of unique pages requested in this hour"
      - name: unique_hosts
        description: "Number of unique hosts (IPs) in this hour"
      - name: total_404
        description: "Count of 404 responses"
      - name: pct_404
        description: "Percentage of 404 responses"
      - name: avg_response_time_ms
        description: "Average response time in milliseconds"
      - name: p95_response_time_ms
        description: "95th percentile response time in milliseconds"
      - name: total_bytes_sent
        description: "Total bytes transferred"
      - name: crawler_requests
        description: "Requests from known crawler IPs"
      - name: pct_crawler
        description: "Percentage of requests from crawlers"
      - name: slow_requests
        description: "Count of requests with response time exceeding 5000ms"
      - name: pct_slow_requests
        description: "Percentage of requests with response time exceeding 5000ms"

  - name: mart_browser_analysis
    description: "Daily browser and client analysis with device category, platform breakdown, and traffic share"
    tests:
      - dbt_utils.expression_is_true:
          expression: "total_requests >= 0"
    columns:
      - name: date_sk
        description: "Foreign key to dim_date"
        tests:
          - not_null
      - name: date
        description: "Calendar date"
      - name: browser_name
        description: "Browser family (Chrome, Firefox, Safari, etc.)"
      - name: operating_system
        description: "Operating system family"
      - name: device_type
        description: "Device type (Desktop, Mobile, Tablet, etc.)"
      - name: is_mobile
        description: "Flag indicating mobile user agent"
      - name: device_category
        description: "Device category (Desktop or Mobile/Tablet)"
      - name: total_requests
        description: "Total requests for this browser/OS combination"
      - name: unique_hosts
        description: "Number of unique hosts (IPs)"
      - name: avg_response_time_ms
        description: "Average response time in milliseconds"
      - name: total_bytes_sent
        description: "Total bytes transferred"
      - name: pct_of_daily_traffic
        description: "Percentage of the day's total traffic"
      - name: browser_rank
        description: "Rank of this browser family for the day (1 = most traffic)"
