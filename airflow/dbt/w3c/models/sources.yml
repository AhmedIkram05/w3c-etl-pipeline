version: 2

sources:
  - name: w3c
    database: w3c_warehouse
    schema: public
    tables:
      - name: raw_logs
        description: "Staging table containing parsed W3C IIS log entries"
        columns:
          - name: id
            description: "Primary key"
            tests:
              - unique
              - not_null
          - name: log_date
            description: "Request date"
          - name: log_time
            description: "Request time"
          - name: client_ip
            description: "Client IP address"
          - name: method
            description: "HTTP method"
          - name: uri_stem
            description: "URI stem (path)"
          - name: uri_query
            description: "URI query string"
          - name: status_code
            description: "HTTP status code"
          - name: sub_status
            description: "IIS sub status code"
          - name: win32_status
            description: "Windows (Win32) status code"
          - name: referrer
            description: "Referrer URL"
          - name: bytes_sent
            description: "Bytes sent in response"
          - name: time_taken
            description: "Time taken in milliseconds"
          - name: protocol
            description: "HTTP protocol version"
          - name: user_agent
            description: "User-Agent string"

      - name: dim_geolocation
        description: "Geolocation dimension populated by Airflow via ip-api.com API"
        columns:
          - name: geolocation_sk
            description: "Surrogate key"
            tests:
              - unique
              - not_null

      - name: dim_useragent
        description: "User-Agent dimension populated by Airflow via user_agents library"
        columns:
          - name: user_agent_sk
            description: "Surrogate key"
            tests:
              - unique
              - not_null
          - name: user_agent
            description: "Raw User-Agent string"

      - name: dim_visitortype
        description: "Visitor type dimension (Crawler = 1, Human = 2, Unknown = -1)"
        columns:
          - name: visitor_sk
            description: "Surrogate key"
            tests:
              - unique
              - not_null

      - name: crawler_ips
        description: "Known crawler IP addresses populated by Airflow via DetectCrawlerIPs"
        columns:
          - name: ip
            description: "Crawler IP address"
            tests:
              - unique
              - not_null

