version: 2

sources:
  - name: w3c
    database: "{% if target.type == 'sqlserver' %}{{ env_var('AZURE_SQL_DB', 'w3c_warehouse') }}{% else %}w3c_warehouse{% endif %}"
    schema: "{% if target.type == 'sqlserver' %}dbo{% else %}public{% endif %}"
    tables:
      - name: raw_enriched
        description: "Denormalized enriched log table populated by Spark pipeline via GeoLite2 + PySpark UDFs. Contains all raw log fields plus geo, user-agent, and computed enrichment columns."

      - name: dim_geolocation
        description: "Authoritative geolocation dimension. Populated by Airflow export_dimensions task by reading the silver Delta table (written by Spark enrichment using GeoLite2-City.mmdb + GeoLite2-ASN.mmdb). Used as the single source of truth for client-IP country/region/city/postcode/lat/lon/isp across the warehouse. Surrogate key -1 = Unknown."
        columns:
          - name: geolocation_sk
            description: "Surrogate key"
            tests:
              - unique
              - not_null
          - name: ip
            description: "Client IP address"
          - name: country
            description: "Country name"
          - name: region
            description: "Region/state name"
          - name: city
            description: "City name"
          - name: postcode
            description: "Postal code ('-' if unknown)"
          - name: latitude
            description: "Latitude coordinate"
          - name: longitude
            description: "Longitude coordinate"
          - name: isp
            description: "Internet Service Provider name"

      - name: dim_useragent
        description: "User-Agent dimension populated by Airflow export_dimensions task via user_agents library. Surrogate key -1 = Unknown."
        columns:
          - name: user_agent_sk
            description: "Surrogate key"
            tests:
              - unique
              - not_null
          - name: user_agent
            description: "Raw User-Agent string"
          - name: browser_name
            description: "Browser family (e.g. Chrome, Firefox)"
          - name: operating_system
            description: "Operating system family (e.g. Windows, Mac OS X)"
          - name: device_type
            description: "Device type (e.g. Desktop, Mobile, Tablet)"
