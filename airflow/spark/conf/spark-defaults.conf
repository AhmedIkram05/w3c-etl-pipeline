# ──────────────────────────────────────────────────────────────────────
# Spark Configuration — W3C ETL Pipeline
#
# Delta Lake 4.0.1 is loaded at runtime via Maven coordinates.
# Delta 4.0.x is compiled for Spark 4.0.x; 4.1+ targets Spark 4.1+ APIs.
# Adaptive Query Execution is enabled for optimal performance.
# Partition overwrite mode is set to "dynamic" so that only affected
# partitions are rewritten during incremental loads.
# ──────────────────────────────────────────────────────────────────────

# ── Delta Lake ────────────────────────────────────────────────────────
spark.sql.extensions                       io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog            org.apache.spark.sql.delta.catalog.DeltaCatalog
spark.databricks.delta.retentionDurationCheck.enabled false

# Delta Lake JAR — resolved automatically from Maven Central at runtime
spark.jars.packages                        io.delta:delta-spark_2.13:4.0.1

# ── Adaptive Query Execution ──────────────────────────────────────────
spark.sql.adaptive.enabled                 true
spark.sql.adaptive.coalescePartitions.enabled true
spark.sql.adaptive.skewJoin.enabled        true

# ── Partitioning & Write Behaviour ────────────────────────────────────
spark.sql.sources.partitionOverwriteMode   dynamic

# ── Local Filesystem ──────────────────────────────────────────────────
spark.hadoop.fs.defaultFS                  file:///
